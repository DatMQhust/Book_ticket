version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: dat
      POSTGRES_PASSWORD: dat
      POSTGRES_DB: bookingService
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  rabbitmq:
    build:
      context: ./rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: dat
      RABBITMQ_DEFAULT_PASS: dat
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins
    networks:
      - backend

volumes:
  postgres_data:   # volume để data không bị mất khi xoá container
  rabbitmq_data:   # volume để data RabbitMQ không bị mất khi xoá container

networks:
  backend:
    driver: bridge
